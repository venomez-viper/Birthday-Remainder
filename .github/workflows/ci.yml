name: CI

# Build checks: run on every push and pull request.
# Vercel also builds each push (its own deploy check); this gates types + lint + build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy values so prisma generate / next build run without secrets.
      # No DB connection happens at build time.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?sslmode=require"
      NEXTAUTH_SECRET: "ci-dummy-secret"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx next build
