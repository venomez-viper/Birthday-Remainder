<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <defs>
    <radialGradient id="roseA" cx="42%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#f6d3dd"/>
      <stop offset="48%" stop-color="#e3a3b6"/>
      <stop offset="100%" stop-color="#c97e92"/>
    </radialGradient>
    <radialGradient id="roseB" cx="44%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#fbe3ea"/>
      <stop offset="55%" stop-color="#edb6c5"/>
      <stop offset="100%" stop-color="#d693a6"/>
    </radialGradient>
    <radialGradient id="budA" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fbeef2"/>
      <stop offset="100%" stop-color="#e6b9c6"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b6c4a0"/>
      <stop offset="100%" stop-color="#8a9d76"/>
    </linearGradient>
    <linearGradient id="leafB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aebd96"/>
      <stop offset="100%" stop-color="#7f9168"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
  </defs>

  <g filter="url(#soft)" opacity="0.96">
    <!-- trailing botanical sprigs / eucalyptus stems -->
    <g stroke="#9caf8a" stroke-width="1.6" fill="none" opacity="0.85" stroke-linecap="round">
      <path d="M70 24 C120 30 168 56 196 104"/>
      <path d="M30 70 C40 120 70 168 110 196"/>
    </g>
    <!-- small leaves along the right stem -->
    <g fill="url(#leafA)" opacity="0.9">
      <ellipse cx="118" cy="33" rx="11" ry="6" transform="rotate(28 118 33)"/>
      <ellipse cx="146" cy="46" rx="12" ry="6.5" transform="rotate(36 146 46)"/>
      <ellipse cx="172" cy="68" rx="12" ry="6.5" transform="rotate(50 172 68)"/>
      <ellipse cx="190" cy="92" rx="10" ry="6" transform="rotate(62 190 92)"/>
    </g>
    <!-- small leaves along the bottom stem -->
    <g fill="url(#leafB)" opacity="0.9">
      <ellipse cx="34" cy="118" rx="6" ry="11" transform="rotate(28 34 118)"/>
      <ellipse cx="47" cy="146" rx="6.5" ry="12" transform="rotate(36 47 146)"/>
      <ellipse cx="69" cy="172" rx="6.5" ry="12" transform="rotate(50 69 172)"/>
      <ellipse cx="93" cy="190" rx="6" ry="10" transform="rotate(62 93 190)"/>
    </g>

    <!-- sage leaf cluster behind the blooms -->
    <g fill="url(#leafB)" opacity="0.92">
      <ellipse cx="44" cy="44" rx="22" ry="11" transform="rotate(-30 44 44)"/>
      <ellipse cx="92" cy="36" rx="20" ry="10" transform="rotate(8 92 36)"/>
      <ellipse cx="36" cy="92" rx="10" ry="20" transform="rotate(8 36 92)"/>
      <ellipse cx="78" cy="74" rx="18" ry="9" transform="rotate(-22 78 74)"/>
    </g>
    <g fill="url(#leafA)" opacity="0.85">
      <ellipse cx="70" cy="30" rx="16" ry="8" transform="rotate(-44 70 30)"/>
      <ellipse cx="30" cy="70" rx="8" ry="16" transform="rotate(-44 30 70)"/>
    </g>

    <!-- gypsophila / tiny white filler blooms -->
    <g fill="#fbf7f3" opacity="0.95">
      <circle cx="104" cy="22" r="3"/><circle cx="112" cy="30" r="2.4"/><circle cx="120" cy="24" r="2.2"/>
      <circle cx="22" cy="104" r="3"/><circle cx="30" cy="112" r="2.4"/><circle cx="24" cy="120" r="2.2"/>
      <circle cx="150" cy="60" r="2.4"/><circle cx="60" cy="150" r="2.4"/>
    </g>

    <!-- main blush rose -->
    <g transform="translate(58 58)">
      <circle r="30" fill="url(#roseA)"/>
      <g fill="none" stroke="#b87186" stroke-width="2" opacity="0.55" stroke-linecap="round">
        <path d="M0 -16 A16 16 0 0 1 16 0"/>
        <path d="M16 0 A16 16 0 0 1 0 16"/>
        <path d="M0 16 A16 16 0 0 1 -16 0"/>
        <path d="M-16 0 A16 16 0 0 1 0 -16"/>
      </g>
      <g fill="#f3cdd9" opacity="0.85">
        <circle r="9"/>
      </g>
      <circle r="3.4" fill="#ca839a"/>
    </g>

    <!-- second deeper rose -->
    <g transform="translate(40 100)">
      <circle r="22" fill="url(#roseB)"/>
      <g fill="none" stroke="#bd7a8e" stroke-width="1.7" opacity="0.5" stroke-linecap="round">
        <path d="M0 -11 A11 11 0 0 1 11 0"/>
        <path d="M11 0 A11 11 0 0 1 0 11"/>
        <path d="M0 11 A11 11 0 0 1 -11 0"/>
        <path d="M-11 0 A11 11 0 0 1 0 -11"/>
      </g>
      <circle r="6.5" fill="#f6dbe3" opacity="0.85"/>
      <circle r="2.6" fill="#ca839a"/>
    </g>

    <!-- cream bud, upper -->
    <g transform="translate(104 50)">
      <circle r="15" fill="url(#budA)"/>
      <circle r="5" fill="#f4dde1" opacity="0.8"/>
      <circle r="2" fill="#d3a9b4"/>
    </g>
  </g>
</svg>
